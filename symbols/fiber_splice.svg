<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left fiber line -->
  <line x1="4" y1="32" x2="28" y2="32" stroke="currentColor" stroke-width="3"/>
  <!-- Right fiber line -->
  <line x1="36" y1="32" x2="60" y2="32" stroke="currentColor" stroke-width="3"/>
  <!-- Splice point diamond -->
  <polygon points="32,22 42,32 32,42 22,32" fill="none" stroke="currentColor" stroke-width="3.5"/>
  <!-- Center dot at junction -->
  <circle cx="32" cy="32" r="3" fill="currentColor" stroke="none"/>
</svg>
