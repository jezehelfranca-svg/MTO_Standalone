<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Tall narrow rectangle (rack frame) -->
  <rect x="14" y="4" width="36" height="56" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="4"/>
  <!-- Shelf/RU lines -->
  <line x1="14" y1="18" x2="50" y2="18" stroke="currentColor" stroke-width="2.5"/>
  <line x1="14" y1="30" x2="50" y2="30" stroke="currentColor" stroke-width="2.5"/>
  <line x1="14" y1="42" x2="50" y2="42" stroke="currentColor" stroke-width="2.5"/>
  <!-- Equipment blocks in each RU -->
  <rect x="18" y="7" width="28" height="8" rx="1" ry="1" fill="currentColor" stroke="none" opacity="0.3"/>
  <rect x="18" y="21" width="28" height="6" rx="1" ry="1" fill="currentColor" stroke="none" opacity="0.3"/>
  <rect x="18" y="33" width="28" height="6" rx="1" ry="1" fill="currentColor" stroke="none" opacity="0.3"/>
  <!-- Mounting holes -->
  <circle cx="17" cy="11" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="47" cy="11" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="17" cy="24" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="47" cy="24" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="17" cy="36" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="47" cy="36" r="1.5" fill="currentColor" stroke="none"/>
</svg>
