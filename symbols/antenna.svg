<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Vertical tower mast -->
  <line x1="32" y1="60" x2="32" y2="10" stroke="currentColor" stroke-width="4"/>
  <!-- Antenna triangle at top -->
  <polygon points="32,4 20,22 44,22" fill="none" stroke="currentColor" stroke-width="3.5"/>
  <!-- Tower base supports -->
  <line x1="32" y1="60" x2="20" y2="62" stroke="currentColor" stroke-width="3"/>
  <line x1="32" y1="60" x2="44" y2="62" stroke="currentColor" stroke-width="3"/>
  <!-- Signal lines (horizontal) from antenna -->
  <line x1="46" y1="10" x2="56" y2="10" stroke="currentColor" stroke-width="2.5"/>
  <line x1="48" y1="16" x2="56" y2="16" stroke="currentColor" stroke-width="2.5"/>
  <line x1="46" y1="22" x2="54" y2="22" stroke="currentColor" stroke-width="2.5"/>
  <!-- Signal lines left side -->
  <line x1="8" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="2.5"/>
  <line x1="8" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="2.5"/>
  <line x1="10" y1="22" x2="18" y2="22" stroke="currentColor" stroke-width="2.5"/>
</svg>
