<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Card reader housing -->
  <rect x="14" y="8" width="36" height="48" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="4"/>
  <!-- Card slot (horizontal line) -->
  <line x1="20" y1="32" x2="44" y2="32" stroke="currentColor" stroke-width="3"/>
  <!-- Card insertion arrow -->
  <line x1="32" y1="22" x2="32" y2="30" stroke="currentColor" stroke-width="2.5"/>
  <polyline points="27,26 32,22 37,26" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Indicator light -->
  <circle cx="32" cy="42" r="3" fill="currentColor" stroke="none"/>
</svg>
