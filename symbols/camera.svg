<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Mount arm from ceiling -->
  <line x1="32" y1="4" x2="32" y2="18" stroke="currentColor" stroke-width="4"/>
  <!-- Mount bracket pivot -->
  <circle cx="32" cy="20" r="4" fill="currentColor" stroke="none"/>
  <!-- Camera body (trapezoid/rectangular housing) -->
  <polygon points="18,22 46,22 52,42 12,42" fill="none" stroke="currentColor" stroke-width="3.5"/>
  <!-- Lens (trapezoid front extending right) -->
  <polygon points="46,26 58,20 58,44 46,38" fill="none" stroke="currentColor" stroke-width="3"/>
  <!-- Lens glass circle -->
  <circle cx="54" cy="32" r="3" fill="currentColor" stroke="none"/>
  <!-- IR indicator light -->
  <circle cx="22" cy="32" r="2" fill="currentColor" stroke="none"/>
</svg>
