<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Battery rectangle body -->
  <rect x="6" y="14" width="52" height="36" rx="3" ry="3" fill="none" stroke="currentColor" stroke-width="4"/>
  <!-- Positive terminal -->
  <line x1="16" y1="10" x2="16" y2="14" stroke="currentColor" stroke-width="4"/>
  <text x="16" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="currentColor" stroke="none">+</text>
  <!-- Negative terminal -->
  <line x1="48" y1="10" x2="48" y2="14" stroke="currentColor" stroke-width="4"/>
  <text x="48" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="currentColor" stroke="none">−</text>
  <!-- Lightning bolt inside -->
  <polygon points="36,20 28,33 34,33 28,44 40,30 34,30 36,20" fill="currentColor" stroke="none"/>
</svg>
